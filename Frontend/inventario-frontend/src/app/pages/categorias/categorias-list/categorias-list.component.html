<div class="page-header">
  <h1>Gestión de Categorías</h1>
  <button mat-flat-button color="primary" (click)="abrirFormulario()" *ngIf="authService.isAdmin()">
    <mat-icon>add</mat-icon> Nueva Categoría
  </button>
</div>

<div class="card-container">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar categoría</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput (keyup)="aplicarFiltro($event)" placeholder="Ej. Electrónica">
  </mat-form-field>

  <div class="mat-elevation-z1 table-container">
    <table mat-table [dataSource]="dataSource" matSort>
      
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
        <td mat-cell *matCellDef="let element"> <strong>{{element.nombre}}</strong> </td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef> Descripción </th>
        <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="acciones-header"> Acciones </th>
        <td mat-cell *matCellDef="let element" class="acciones-cell">
          <button mat-icon-button color="primary" (click)="abrirFormulario(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(element.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <!-- Fila que se muestra si no hay datos -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4" style="text-align: center; padding: 24px;">
          No se encontraron datos.
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Seleccionar página"></mat-paginator>
  </div>
</div>
