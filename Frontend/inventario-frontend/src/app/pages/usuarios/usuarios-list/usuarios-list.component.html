<div class="page-header">
  <h1>Gestión de Usuarios</h1>
  <button mat-flat-button color="primary" (click)="abrirFormulario()">
    <mat-icon>person_add</mat-icon> Nuevo Usuario
  </button>
</div>

<div class="card-container">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar usuario</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput (keyup)="aplicarFiltro($event)" placeholder="Ej. admin">
  </mat-form-field>

  <div class="mat-elevation-z1 table-container">
    <table mat-table [dataSource]="dataSource" matSort>
      
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Usuario </th>
        <td mat-cell *matCellDef="let element"> 
          <div class="user-cell">
            <mat-icon class="user-icon">account_circle</mat-icon>
            <strong>{{element.username}}</strong> 
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre Completo </th>
        <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
      </ng-container>

      <ng-container matColumnDef="rol">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Rol </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="role-badge" [class.admin-role]="element.rol === 'ADMIN'">
            {{element.rol}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Estado </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="status-badge" [class.active]="element.estado" [class.inactive]="!element.estado">
            {{element.estado ? 'Activo' : 'Inactivo'}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="fechaCreacion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Creado el </th>
        <td mat-cell *matCellDef="let element"> {{element.fechaCreacion | date:'dd/MM/yyyy'}} </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="acciones-header"> Acciones </th>
        <td mat-cell *matCellDef="let element" class="acciones-cell">
          <button mat-icon-button color="primary" (click)="abrirFormulario(element)" matTooltip="Editar usuario">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(element)" matTooltip="Eliminar usuario">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="6" style="text-align: center; padding: 24px;">
          No se encontraron usuarios.
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" aria-label="Seleccionar página"></mat-paginator>
  </div>
</div>
