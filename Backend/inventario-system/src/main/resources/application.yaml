spring:
  application:
    name: inventario-system

  datasource:
    url: jdbc:mysql://localhost:3306/sistema_inventario?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: "" # Cambiar si tienes contraseña en tu MySQL
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Validamos el esquema contra las entidades, pero NO creamos ni actualizamos tablas con Hibernate.
      # Flyway se encargará de crear las tablas.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true # Permite aplicar flyway en bases de datos que no están vacías (si aplica)
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Configuración de JWT
app:
  jwt:
    # Secret key en Base64. IMPORTANTE: en producción, usar una clave segura de al menos 256 bits.
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    # Expiración del token: 24 horas (en milisegundos)
    expiration-ms: 86400000
